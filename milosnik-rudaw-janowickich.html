    <style>
        :root {
            --primary-color: #2d5a27;
            --secondary-color: #4a7c44;
            --accent-color: #f4f1de;
            --text-dark: #333;
            --bg-light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .stats {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--secondary-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Kontener na zdjęcie zabezpieczający proporcje */
        .card-image-wrapper {
            width: 100%;
            background-color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 220px;
            object-fit: cover; /* Na komputerach ładnie docina do siatki */
            display: block;
        }

        .card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .peak-name {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: var(--primary-color);
            line-height: 1.3;
        }

        .peak-info {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-top: auto;
        }

        .peak-info span {
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 5px;
            font-size: 0.85rem;
        }
        
        .type-badge {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 5px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Reguły dla telefonów komórkowych */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .grid-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            /* Zdjęcie na całą szerokość ekranu, bez przycinania */
            .card-image {
                height: auto;
                max-height: 400px;
                object-fit: contain; 
                background-color: #2c3e50; /* Ciemne tło dla kontrastu, gdy zdjęcie ma inne proporcje */
            }
        }
    </style>
</head>
