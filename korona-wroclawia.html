<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korona Wrocławia</title>
    <link rel="icon" href="dawi108.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <script src="script.js"></script>
    <style>
        :root {
            --primary-color: #2d5a27;
            --secondary-color: #4a7c44;
            --accent-color: #f4f1de;
            --text-dark: #333;
            --bg-light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stats {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--secondary-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 15px;
        }

        .card-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        .peak-name {
            font-size: 1.3rem;
            margin: 0 0 10px 0;
            color: var(--primary-color);
            min-height: 3.2em;
            display: flex;
            align-items: center;
        }

        .peak-info {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .peak-info span {
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Korona Wrocławia</h1>
    <div class="stats">Postęp: 5 / 5 (100%) ✅</div>
</header>

<div class="grid-container" id="gallery">
    </div>

<script>
    const miejsca = [
        {lp: 1, nazwa: "Sky Tower", wys: 212, data: "10.02.2024", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778071509/sky-tower_ysg4zo.png"},
        {lp: 2, nazwa: "Archikatedra św. Jana Chrzciciela", wys: 97, data: "14.10.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778071510/katedra-jana-chrzciciela_hkrv5w.png"},
        {lp: 3, nazwa: "Kościół św. Elżbiety", wys: 91, data: "14.10.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778071510/kosciol-elzbiety_pndfcg.png"},
        {lp: 4, nazwa: "Mostek Pokutnic (Maria Magdalena)", wys: 45, data: "14.10.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778071511/mostek-pokutnic_zx10cq.png"},
        {lp: 5, nazwa: "Wieża Matematyczna (UWr)", wys: 42, data: "14.10.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778071509/wieza-matematyczna_ouubnk.png"}
    ];

    const gallery = document.getElementById('gallery');

    miejsca.forEach(m => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-number">${m.lp}</div>
            <img src="${m.img}" alt="${m.nazwa}" class="card-image" onerror="this.src='https://via.placeholder.com/400x250?text=Brak+zdjęcia'">
            <div class="card-content">
                <h2 class="peak-name">${m.nazwa}</h2>
                <div class="peak-info">
                    <div><span>Wysokość wieży:</span> ${m.wys} m</div>
                    <div class="badge">📅 Zdobyto: ${m.data}</div>
                </div>
            </div>
        `;
        gallery.appendChild(card);
    });
</script>

</body>
</html>
