<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korona Ziemi Kłodzkiej</title>
    <link rel="icon" href="dawi108.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <script src="script.js"></script>
    <style>
        :root {
            --primary: #1a5f7a;
            --secondary: #159895;
            --accent: #54bab9;
            --background: #f0f2f5;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        .counter {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .card-img-container {
            width: 100%;
            overflow: hidden;
            background-color: #e0e0e0;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .card-body {
            padding: 20px;
        }

        .peak-number {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(26, 95, 122, 0.9);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        .peak-title {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--primary);
        }

        .peak-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .height {
            background: #e8f4f8;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        .date {
            color: #7f8c8d;
            display: flex;
            align-items: center;
        }

        .date::before {
            content: '📅';
            margin-right: 5px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Korona Ziemi Kłodzkiej</h1>
    <div class="counter">Status: 12 / 12 Szczytów Ukończono ✅</div>
</header>

<main class="grid" id="peaks-container">
    </main>

<script>
    const peaks = [
        {lp: 1, nazwa: "Śnieżnik Kłodzki", wys: 1426, data: "30.10.2022", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777986679/snieznik-klodzki_pyso5a.png"},
        {lp: 2, nazwa: "Rudawiec", wys: 1112, data: "13.11.2021", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777986942/rudawiec_vq2vo2.png"},
        {lp: 3, nazwa: "Orlica", wys: 1084, data: "04.06.2021", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777986681/orlica_yzqx2y.png"},
        {lp: 4, nazwa: "Wielka Sowa", wys: 1015, data: "20.10.2022", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777918686/wielka-sowa_ui8rrg.png"},
        {lp: 5, nazwa: "Kowadło", wys: 989, data: "12.11.2021", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777986678/kowadlo_gc8ivq.png"},
        {lp: 6, nazwa: "Jagodna", wys: 977, data: "05.06.2021", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777986679/jagodna_mapbhk.png"},
        {lp: 7, nazwa: "Suchoń", wys: 964, data: "10.08.2022", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777987112/suchon_cvenfn.png"},
        {lp: 8, nazwa: "Szczeliniec Wielki", wys: 919, data: "03.06.2021", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777986942/szczeliniec-wielki_yd11mu.png"},
        {lp: 9, nazwa: "Grodziec", wys: 803, data: "02.05.2022", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777987113/grodziec_f1nuvk.png"},
        {lp: 10, nazwa: "Kłodzka Góra", wys: 765, data: "14.05.2024", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777984266/klodzka-gora_yuov5b.png"},
        {lp: 11, nazwa: "Włodzicka Góra", wys: 758, data: "03.05.2022", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777985255/wlodzicka-gora_jmmffd.png"},
        {lp: 12, nazwa: "Nowa Kopa", wys: 553, data: "02.01.2022", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777986941/nowa-kopa-bez_zytwyv.png"}
    ];

    const container = document.getElementById('peaks-container');

    peaks.forEach(peak => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="peak-number">Szczyt ${peak.lp}</div>
            <div class="card-img-container">
                <img src="${peak.img}" alt="${peak.nazwa}" class="card-img" loading="lazy">
            </div>
            <div class="card-body">
                <h2 class="peak-title">${peak.nazwa}</h2>
                <div class="peak-meta">
                    <span class="height">${peak.wys} m n.p.m.</span>
                    <span class="date">${peak.data}</span>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
</script>

</body>
</html>
