        :root {
            --primary-color: #2d5a27;
            --secondary-color: #4a7c44;
            --accent-color: #f4f1de;
            --text-dark: #333;
            --bg-light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stats {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--secondary-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 12px;
            flex-grow: 1;
        }

        .card-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .id-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            z-index: 10;
        }

        .peak-name {
            font-size: 1.1rem;
            margin: 0 0 8px 0;
            color: var(--primary-color);
            line-height: 1.3;
        }

        .badge {
            display: inline-block;
            background: #f0f2f0;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #555;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
