<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korona Gór Kruczych</title>
    <link rel="icon" href="dawi108.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <script src="script.js"></script>
    <style>
        :root {
            --primary-color: #2d5a27;
            --secondary-color: #4a7c44;
            --accent-color: #f4f1de;
            --text-dark: #333;
            --bg-light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stats {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--secondary-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 15px;
        }

        .card-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        .peak-name {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        .peak-info {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .peak-info span {
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Korona Gór Kruczych</h1>
    <div class="stats">Postęp: 15 / 15 (100%) ✅</div>
</header>

<div class="grid-container" id="gallery">
    </div>

<script>
    const szczyty = [
        {lp: 1, nazwa: "Královecký Špičák", wys: 881, data: "09.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763987/kralovecky-spicak_a2fxz9.png"},
        {lp: 2, nazwa: "Szeroka", wys: 842, data: "09.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783764270/szeroka_f9kcdt.png"},
        {lp: 3, nazwa: "Mrowiniec", wys: 817, data: "09.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763987/mrowiniec_uopssj.png"},
        {lp: 4, nazwa: "Polska Góra", wys: 792, data: "09.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783764269/polska-gora_qdznjn.png"},
        {lp: 5, nazwa: "Bógdoł", wys: 747, data: "09.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783764270/bogdal_igc6bp.png"},
        {lp: 6, nazwa: "Święta Góra", wys: 701, data: "07.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763987/swieta-gora_v3vazh.png"},
        {lp: 7, nazwa: "Jański Wierch", wys: 697", data: "03.05.2023", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783764269/janski-wierch_d7zrkg.png"},
        {lp: 8, nazwa: "Krucza Skała", wys: 681, data: "09.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783764269/krucza-skala_nmyi5m.png"},
        {lp: 9, nazwa: "Kierz", wys: 662, data: "07.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763718/kierz_vtmnjl.png"},
        {lp: 10, nazwa: "Anielska Góra", wys: 651, data: "07.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763718/anielska-gora_h5dhjv.png"},
        {lp: 11, nazwa: "Miejska Górka", wys: 650, data: "07.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763718/miejska-gorka_a5smnn.png"},
        {lp: 12, nazwa: "Bogoria", wys: 645, data: "09.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763987/bogoria_y3z0we.png"},
        {lp: 13, nazwa: "Sołtysia", wys: 640, data: "07.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763987/soltysia_ek47yd.png"},
        {lp: 14, nazwa: "Długosz", wys: 589, data: "07.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763719/dlugosz_r40qd4.png"},
        {lp: 15, nazwa: "Kościelna", wys: 513, data: "07.07.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1783763719/koscielna_uqeodx.png"}
    ];

    const gallery = document.getElementById('gallery');

    szczyty.forEach(s => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-number">${s.lp}</div>
            <img src="${s.img}" alt="${s.nazwa}" class="card-image" onerror="this.src='https://via.placeholder.com/400x250?text=Brak+zdjęcia'">
            <div class="card-content">
                <h2 class="peak-name">${s.nazwa}</h2>
                <div class="peak-info">
                    <div><span>Wysokość:</span> ${s.wys} m n.p.m.</div>
                    <div class="badge">📅 Zdobyto: ${s.data}</div>
                </div>
            </div>
        `;
        gallery.appendChild(card);
    });
</script>

</body>
</html>
