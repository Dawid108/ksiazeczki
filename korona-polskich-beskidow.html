<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korona Polskich Beskidów</title>
    <link rel="icon" href="dawi108.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <script src="script.js"></script>
    <style>
        :root {
            --primary-color: #2d5a27;
            --secondary-color: #4a7c44;
            --accent-color: #f4f1de;
            --text-dark: #333;
            --bg-light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stats {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--secondary-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 15px;
        }

        .card-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        .peak-name {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        .peak-info {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .peak-info span {
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Korona Polskich Beskidów</h1>
    <div class="stats">Postęp: 10 / 10 (100%) ✅</div>
</header>

<div class="grid-container" id="gallery">
    </div>

<script>
    const szczyty = [
        {lp: 1, nazwa: "Babia Góra", wys: 1725, data: "15.07.2024", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073126/babia-gora_oiq8af.png"},
        {lp: 2, nazwa: "Tarnica", wys: 1346, data: "05.07.2021", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073444/tarnica_oql582.png"},
        {lp: 3, nazwa: "Turbacz", wys: 1310, data: "04.07.2020", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073125/turbacz_vxjsda.png"},
        {lp: 4, nazwa: "Radziejowa", wys: 1262, data: "30.06.2023", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073616/radziejowa_gkhyop.png"},
        {lp: 5, nazwa: "Skrzyczne", wys: 1257, data: "29.12.2022", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073441/skrzyczne_n6dvwx.png"},
        {lp: 6, nazwa: "Mogielica", wys: 1170, data: "27.06.2023", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073617/mogielica_hunmuo.png"},
        {lp: 7, nazwa: "Wysoka", wys: 1050, data: "12.06.2021", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073442/wysoka-pieniny_mtscvt.png"},
        {lp: 8, nazwa: "Lackowa", wys: 997, data: "29.06.2023", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073617/lackowa_nsu3b5.png"},
        {lp: 9, nazwa: "Czupel", wys: 933, data: "16.07.2024", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073125/czupel_y64un2.png"},
        {lp: 10, nazwa: "Lubomir", wys: 904, data: "13.06.2021", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1778073443/lubomir_j4zmig.png"}
    ];

    const gallery = document.getElementById('gallery');

    szczyty.forEach(s => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-number">${s.lp}</div>
            <img src="${s.img}" alt="${s.nazwa}" class="card-image" onerror="this.src='https://via.placeholder.com/400x250?text=Brak+zdjęcia'">
            <div class="card-content">
                <h2 class="peak-name">${s.nazwa}</h2>
                <div class="peak-info">
                    <div><span>Wysokość:</span> ${s.wys} m n.p.m.</div>
                    <div class="badge">📅 Zdobyto: ${s.data}</div>
                </div>
            </div>
        `;
        gallery.appendChild(card);
    });
</script>

</body>
</html>
