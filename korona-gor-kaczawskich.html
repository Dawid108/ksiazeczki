<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korona Gór Kaczawskich</title>
    <link rel="icon" href="dawi108.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <script src="script.js"></script>
    <style>
        :root {
            --primary-color: #2d5a27;
            --secondary-color: #4a7c44;
            --accent-color: #f4f1de;
            --text-dark: #333;
            --bg-light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stats {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--secondary-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 15px;
        }

        .card-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .peak-name {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        .peak-info {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .peak-info span {
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Korona Gór Kaczawskich</h1>
    <div class="stats">Postęp: 10 / 10 (100%) ✅</div>
</header>

<div class="grid-container" id="gallery">
    <!-- Karty zostaną wygenerowane przez JS -->
</div>

<script>
    const szczyty = [
        {lp: 1, nazwa: "Skopiec", wys: 724, data: "30.01.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1744211761/30_Skopiec_hxirk0.jpg"},
        {lp: 2, nazwa: "Baraniec", wys: 720, data: "30.01.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1746538855/01_Baraniec_mzco3y.jpg"},
        {lp: 3, nazwa: "Okole", wys: 718, data: "04.04.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777980728/okole_mg6urs.png"},
        {lp: 4, nazwa: "Łysa Góra", wys: 711, data: "02.04.2024", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777980294/lysa-gora-kaczawskie_n3lzmu.png"},
        {lp: 5, nazwa: "Turzec", wys: 684, data: "01.11.2023", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777979799/turzec_qjp5lh.png"},
        {lp: 6, nazwa: "Leśniak", wys: 677, data: "04.04.2026", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777982472/lesniak_mdpocm.png"},
        {lp: 7, nazwa: "Ziemski Kopczyk", wys: 672, data: "30.01.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1744211827/30_Ziemski_Kopczyk_2_pbpehv.jpg"},
        {lp: 8, nazwa: "Poręba", wys: 671, data: "22.01.2022", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1777981284/poreba_kj9co7.png"},
        {lp: 9, nazwa: "Ołowiana", wys: 658, data: "02.02.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1744211393/02_O%C5%82owiana_1_s5qs2z.jpg"},
        {lp: 10, nazwa: "Dudziarz", wys: 652, data: "30.01.2025", img: "https://res.cloudinary.com/diljpkw9f/image/upload/v1744211915/30_Dudziarz_roz4xa.jpg"}
    ];

    const gallery = document.getElementById('gallery');

    szczyty.forEach(s => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-number">${s.lp}</div>
            <img src="${s.img}" alt="${s.nazwa}" class="card-image" onerror="this.src='https://via.placeholder.com/400x250?text=Brak+zdjęcia'">
            <div class="card-content">
                <h2 class="peak-name">${s.nazwa}</h2>
                <div class="peak-info">
                    <div><span>Wysokość:</span> ${s.wys} m n.p.m.</div>
                    <div class="badge">📅 Zdobyto: ${s.data}</div>
                </div>
            </div>
        `;
        gallery.appendChild(card);
    });
</script>

</body>
</html>
